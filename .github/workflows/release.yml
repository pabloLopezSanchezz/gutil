name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            format: tar
          - goos: darwin
            goarch: amd64
            format: tar
          - goos: linux
            goarch: arm64
            format: tar
          - goos: linux
            goarch: amd64
            format: tar
          - goos: windows
            goarch: arm64
            format: zip
          - goos: windows
            goarch: amd64
            format: zip
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist/package
          binary=gutil
          if [ "$GOOS" = windows ]; then binary=gutil.exe; fi
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "dist/package/$binary" ./cmd/gutil
          archive="gutil_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}"
          if [ "${{ matrix.format }}" = zip ]; then
            (cd dist/package && zip "../${archive}.zip" "$binary")
          else
            tar -C dist/package -czf "dist/${archive}.tar.gz" "$binary"
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gutil-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/gutil_*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true
      - name: Create checksums
        working-directory: dist
        run: sha256sum gutil_* > checksums.txt
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            dist/gutil_*
            dist/checksums.txt
